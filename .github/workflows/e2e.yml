name: PR check (smoke + lint + typecheck)

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static:
    name: TypeCheck + Lint + Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run format:check

  smoke:
    name: Smoke (1 worker, no shard)
    needs: static
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      CI: "true"
      BASE_URL: ${{ secrets.BASE_URL }}
      API_BASE_URL: ${{ secrets.API_BASE_URL }}
      ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
      ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
      TOTP_SECRET: ${{ secrets.TOTP_SECRET }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium

      # Smoke tests are non-blocking during initial CI bootstrap.
      # Failures still appear in the run summary and uploaded artifacts,
      # but the job reports success so PRs aren't blocked while secrets
      # are being configured and the test suite is being stabilized.
      # Tighten back to fail-on-error once the suite is green on master.
      - name: Run smoke tests (non-blocking)
        continue-on-error: true
        run: npx playwright test --grep @smoke --workers=1 --reporter=blob

      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: blob-report-smoke
          path: blob-report/
          retention-days: 7
      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: trace-smoke
          path: |
            test-results/
            reports/html/
          retention-days: 7
