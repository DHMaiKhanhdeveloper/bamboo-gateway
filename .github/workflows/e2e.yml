name: PR check (smoke + lint + typecheck)

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static:
    name: TypeCheck + Lint + Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run format:check

  smoke:
    name: Smoke (1 worker, no shard)
    needs: static
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      CI: "true"
      BASE_URL: ${{ secrets.BASE_URL }}
      API_BASE_URL: ${{ secrets.API_BASE_URL }}
      ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
      ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
      TOTP_SECRET: ${{ secrets.TOTP_SECRET }}
    steps:
      - name: Check required secrets
        id: check
        run: |
          missing=0
          for v in BASE_URL API_BASE_URL ADMIN_USERNAME ADMIN_PASSWORD TOTP_SECRET; do
            if [ -z "${!v}" ]; then
              echo "::warning::Secret $v is not set"
              missing=1
            fi
          done
          if [ "$missing" = "1" ]; then
            echo "::warning::Skipping smoke tests — required secrets are not configured. Set them in Settings → Secrets → Actions to enable real test runs."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - if: steps.check.outputs.skip != 'true'
        uses: actions/checkout@v4
      - if: steps.check.outputs.skip != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - if: steps.check.outputs.skip != 'true'
        run: npm ci
      - if: steps.check.outputs.skip != 'true'
        run: npx playwright install --with-deps chromium
      - if: steps.check.outputs.skip != 'true'
        run: npx playwright test --grep @smoke --workers=1 --reporter=blob

      - if: always() && steps.check.outputs.skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: blob-report-smoke
          path: blob-report/
          retention-days: 7
      - if: failure() && steps.check.outputs.skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: trace-smoke
          path: |
            test-results/
            reports/html/
          retention-days: 7
